<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <!-- dasyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-800">
    <section class="max-w-md min-h-screen mx-auto py-6 bg-slate-200 ">

        <header>
            <nav class="flex justify-center items-center mt-34">
                <div class="mt-10 flex relative justify-center items-center w-9/12 mb-10">
                    <img class=" w-60 absolute" src="./assets/bg.png" alt="">
                    <img class="w-16 absolute -mt-34" src="./assets/Group.png" alt="">
                </div>
            </nav>
            <form action="#">
                <section class="flex justify-center items-center mt-10 relative bottom-24 ">

                    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-96 border p-4">
                        <label class="label font-bold text-black">Mobaile Number</label>
                        <input id="input-number" type="number" class="input rounded-full border-none bg-slate-200"
                            placeholder="Enter Mobaile your Number" required />

                        <label class="label font-bold text-black">4 Digit Pin</label>
                        <input id="input-digit" type="password" class="input rounded-full border-none bg-slate-200"
                            placeholder="Enrer 4 Digit Pin" required />

                        <button id="btn-login"
                            class="btn btn-neutral mt-4 bg-blue-500 border-none rounded-full">Login</button>
                    </fieldset>

                </section>
            </form>
        </header>
    </section>
    <script src="login.js"></script>
</body>

</html>
